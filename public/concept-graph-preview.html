<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  @keyframes cg-flow { to { stroke-dashoffset: -240; } }
</style>
</helmet>
<div style="position:relative;width:960px;height:680px;overflow:hidden;font-family:'Space Grotesk',system-ui,sans-serif;background:radial-gradient(120% 100% at 50% 38%, #2d626d 0%, #234e58 55%, #1d434c 100%);">

  <!-- faint grid -->
  <div style="position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.035) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.035) 1px,transparent 1px);background-size:42px 42px;mask-image:radial-gradient(130% 110% at 50% 42%,#000 55%,transparent 100%);-webkit-mask-image:radial-gradient(130% 110% at 50% 42%,#000 55%,transparent 100%);"></div>
  <!-- soft inner vignette -->
  <div style="position:absolute;inset:0;box-shadow:inset 0 0 180px rgba(0,0,0,.30);pointer-events:none;"></div>

  <!-- connector layer -->
  <svg viewBox="0 0 960 680" width="960" height="680" style="position:absolute;inset:0;">
    <g fill="none" stroke="#ece2cb" stroke-opacity=".34" stroke-width="1.6" stroke-linecap="round" stroke-dasharray="2 7" style="animation:cg-flow 22s linear infinite;">
      <line x1="411.4" y1="181.2" x2="268.5" y2="266.9"></line>
      <line x1="548.6" y1="181.2" x2="691.5" y2="266.9"></line>
      <line x1="261.3" y1="353.1" x2="361.5" y2="438.8"></line>
      <line x1="698.7" y1="353.1" x2="598.5" y2="438.8"></line>
      <line x1="446" y1="470" x2="514" y2="470"></line>
      <line x1="425.9" y1="509.1" x2="449.8" y2="542.7"></line>
      <line x1="534.1" y1="509.1" x2="510.2" y2="542.7"></line>
    </g>
  </svg>

  <!-- root topic -->
  <div style="position:absolute;left:400px;top:60px;width:160px;height:160px;border-radius:50%;background:linear-gradient(165deg,#f6efdd,#e9ddc2);box-shadow:0 14px 30px rgba(0,0,0,.28),inset 0 1px 0 rgba(255,255,255,.7),inset 0 -8px 18px rgba(140,120,80,.12);display:flex;align-items:center;justify-content:center;text-align:center;">
    <span style="color:#3a3224;font-size:15px;font-weight:600;letter-spacing:1.6px;text-transform:uppercase;line-height:1.3;">AI in 2026</span>
  </div>

  <!-- branch topics -->
  <div style="position:absolute;left:131px;top:231px;width:148px;height:148px;border-radius:50%;background:linear-gradient(165deg,#f6efdd,#e9ddc2);box-shadow:0 12px 26px rgba(0,0,0,.26),inset 0 1px 0 rgba(255,255,255,.7),inset 0 -8px 18px rgba(140,120,80,.12);display:flex;align-items:center;justify-content:center;text-align:center;padding:0 18px;box-sizing:border-box;">
    <span style="color:#3a3224;font-size:13.5px;font-weight:600;letter-spacing:1.4px;text-transform:uppercase;line-height:1.4;">Peak oil is coming</span>
  </div>

  <div style="position:absolute;left:681px;top:231px;width:148px;height:148px;border-radius:50%;background:linear-gradient(165deg,#f6efdd,#e9ddc2);box-shadow:0 12px 26px rgba(0,0,0,.26),inset 0 1px 0 rgba(255,255,255,.7),inset 0 -8px 18px rgba(140,120,80,.12);display:flex;align-items:center;justify-content:center;text-align:center;padding:0 18px;box-sizing:border-box;">
    <span style="color:#3a3224;font-size:13.5px;font-weight:600;letter-spacing:1.4px;text-transform:uppercase;line-height:1.4;">Can we build AI in space?</span>
  </div>

  <!-- category tags (outlined) -->
  <div style="position:absolute;left:350px;top:422px;width:96px;height:96px;border-radius:50%;border:1.5px solid rgba(236,226,203,.55);background:rgba(236,226,203,.04);display:flex;align-items:center;justify-content:center;text-align:center;">
    <span style="color:#ece2cb;font-size:11.5px;font-weight:500;letter-spacing:1.6px;text-transform:uppercase;">Energy</span>
  </div>

  <div style="position:absolute;left:514px;top:422px;width:96px;height:96px;border-radius:50%;border:1.5px solid rgba(236,226,203,.55);background:rgba(236,226,203,.04);display:flex;align-items:center;justify-content:center;text-align:center;">
    <span style="color:#ece2cb;font-size:11.5px;font-weight:500;letter-spacing:1.6px;text-transform:uppercase;">Compute</span>
  </div>

  <div style="position:absolute;left:428px;top:533px;width:104px;height:104px;border-radius:50%;border:1.5px solid rgba(236,226,203,.55);background:rgba(236,226,203,.04);display:flex;align-items:center;justify-content:center;text-align:center;">
    <span style="color:#ece2cb;font-size:11.5px;font-weight:500;letter-spacing:1.6px;text-transform:uppercase;">Geography</span>
  </div>

</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:960,&quot;height&quot;:680}}"></script>
</body>
</html>
